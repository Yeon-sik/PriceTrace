name: Sync project introduction to Notion

on:
  push:
    branches: [main]
    paths:
      - docs/Project_Intro.md
      - .github/workflows/sync-project-intro-to-notion.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notion-project-intro
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Notion page from Markdown
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          (async () => {

          const apiKey = process.env.NOTION_API_KEY;
          const pageId = process.env.NOTION_PAGE_ID;
          if (!apiKey || !pageId) {
            throw new Error('NOTION_API_KEY and NOTION_PAGE_ID GitHub Secrets are required.');
          }

          const markdown = fs.readFileSync('docs/Project_Intro.md', 'utf8');
          const response = await fetch(`https://api.notion.com/v1/pages/${pageId}/markdown`, {
            method: 'PATCH',
            headers: {
              Authorization: `Bearer ${apiKey}`,
              'Content-Type': 'application/json',
              'Notion-Version': '2026-03-11',
            },
            body: JSON.stringify({
              type: 'replace_content',
              replace_content: { new_str: markdown },
            }),
          });

          const body = await response.text();
          if (!response.ok) {
            throw new Error(`Notion API ${response.status}: ${body}`);
          }
          console.log(`Notion page updated: ${pageId}`);
          })().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
